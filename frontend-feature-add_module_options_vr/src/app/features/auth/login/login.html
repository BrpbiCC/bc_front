<div class="login-wrapper">
  <div class="login-card">
    <div class="login-header">
      <img [src]="logoLight" alt="FrioCheck Logo" class="logo-image logo-light" />
      <img [src]="logoDark" alt="FrioCheck Logo" class="logo-image logo-dark" />
      <p class="brand-sub">Gestión de Activos NFC</p>
    </div>

    <div class="login-form">
      <div class="form-group">
        <label for="usuario">Usuario</label>
        <div class="input-wrap">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
            <circle cx="12" cy="7" r="4" />
          </svg>
          <input id="usuario" type="text" [(ngModel)]="usuario" placeholder="Ingresa tu usuario" />
        </div>
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <div class="input-wrap">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
            <path d="M7 11V7a5 5 0 0 1 10 0v4" />
          </svg>
          <input id="password" type="password" [(ngModel)]="password" placeholder="••••••••" />
        </div>
      </div>

      <button class="btn-login" (click)="onLogin()">Iniciar Sesión</button>

      <a href="#" class="forgot-link">¿Olvidaste tu contraseña?</a>
    </div>
  </div>
</div>
