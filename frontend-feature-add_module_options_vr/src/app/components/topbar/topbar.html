<header class="topbar">
  <div class="topbar-content">

    <!-- Mobile menu button -->
    <button class="mobile-menu-btn" (click)="toggleMobileMenu()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="3" y1="6" x2="21" y2="6" />
        <line x1="3" y1="12" x2="21" y2="12" />
        <line x1="3" y1="18" x2="21" y2="18" />
      </svg>
    </button>

    <!-- Recent Views Carousel (desktop only) -->
    <div class="recent-views-carousel" *ngIf="recentViews.length > 0">
      <button
        class="carousel-btn prev"
        *ngIf="canGoPrev"
        (click)="prevCarousel()"
      >
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6" />
        </svg>
      </button>

      <div class="recent-views">
        <a
          *ngFor="let view of recentViews; let i = index"
          [routerLink]="view.route"
          class="recent-view-item"
          [class.active]="isActiveRoute(view.route)"
          [style.animation-delay]="(i * 0.08) + 's'"
          [ngClass]="{
            'animate-next': carouselDirection === 'next',
            'animate-prev': carouselDirection === 'prev'
          }"
        >
          <svg *ngIf="view.icon === 'home'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" /><polyline points="9 22 9 12 15 12 15 22" /></svg>
          <svg *ngIf="view.icon === 'alert-circle'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10" /><line x1="12" y1="8" x2="12" y2="12" /><line x1="12" y1="16" x2="12.01" y2="16" /></svg>
          <svg *ngIf="view.icon === 'map-pin'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" /><circle cx="12" cy="10" r="3" /></svg>
          <svg *ngIf="view.icon === 'layers'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2" /><polyline points="2 17 12 22 22 17" /><polyline points="2 12 12 17 22 12" /></svg>
          <svg *ngIf="view.icon === 'bar-chart'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10" /><line x1="12" y1="20" x2="12" y2="4" /><line x1="6" y1="20" x2="6" y2="14" /></svg>
          <svg *ngIf="view.icon === 'users'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" /><circle cx="9" cy="7" r="4" /><path d="M23 21v-2a4 4 0 0 0-3-3.87" /><path d="M16 3.13a4 4 0 0 1 0 7.75" /></svg>
          <svg *ngIf="view.icon === 'package'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="16.5" y1="9.4" x2="7.5" y2="4.21" /><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z" /><polyline points="3.27 6.96 12 12.01 20.73 6.96" /><line x1="12" y1="22.08" x2="12" y2="12" /></svg>
          <svg *ngIf="view.icon === 'store'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l1-6h16l1 6" /><path d="M3 9a2 2 0 0 0 4 0 2 2 0 0 0 4 0 2 2 0 0 0 4 0 2 2 0 0 0 4 0" /><path d="M5 22V12h14v10" /><path d="M9 22v-4h6v4" /></svg>
          <svg *ngIf="view.icon === 'settings'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3" /><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" /></svg>
          <svg *ngIf="view.icon === 'user'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" /><circle cx="12" cy="7" r="4" /></svg>
        </a>
      </div>

      <button
        class="carousel-btn next"
        *ngIf="canGoNext"
        (click)="nextCarousel()"
      >
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="9 18 15 12 9 6" />
        </svg>
      </button>
    </div>

    <!-- Search (desktop only) -->
    <div class="search-box desktop-only">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8" />
        <line x1="21" y1="21" x2="16.65" y2="16.65" />
      </svg>
      <input type="text" placeholder="Buscar código NFC, local o técnico..." />
    </div>

    <!-- Filters — visible en desktop y mobile -->
    <div class="filters-section" *ngIf="allFilters.length > 0">
      <button
        class="filters-btn"
        (click)="toggleFiltersDropdown()"
        [class.active]="showFiltersDropdown"
        type="button"
      >
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3" />
        </svg>
        <span class="filters-btn-text">Filtrar</span>
        <span class="filters-count" *ngIf="getActiveFiltersCount() > 0">{{ getActiveFiltersCount() }}</span>
      </button>

      <div class="filters-panel" *ngIf="showFiltersDropdown">
        <div class="filters-sidebar">
          <div class="filters-header">
            <span>Filtros</span>
            <span class="filters-count-badge">{{ allFilters.length }}</span>
          </div>

          <div class="filters-scroll">
            <div class="filter-group" *ngFor="let filter of allFilters; let i = index">
              <div class="filter-join" *ngIf="i > 0 && filter.type === 'select'">
                <span class="join-label">Coincidir con:</span>
                <div class="join-options">
                  <button class="join-btn" [class.active]="filter.join === 'AND'" (click)="setFilterJoin(filter.key, 'AND')">Y</button>
                  <button class="join-btn" [class.active]="filter.join === 'OR'" (click)="setFilterJoin(filter.key, 'OR')">O</button>
                </div>
              </div>

              <label class="filter-label">{{ filter.label }}</label>

              <div class="filter-input-wrap" [class.has-value]="getDisplayValue(filter.key)">
                <input
                  *ngIf="filter.type === 'input'"
                  type="text"
                  [placeholder]="filter.placeholder"
                  class="filter-input"
                  [(ngModel)]="filterValues[filter.key]"
                  (input)="applyFilters()"
                />
                <div *ngIf="filter.type === 'select'" class="filter-multiselect" (click)="toggleMultiSelect(filter.key)">
                  <span class="multiselect-display" *ngIf="getDisplayValue(filter.key)">{{ getDisplayValue(filter.key) }}</span>
                  <span class="multiselect-placeholder" *ngIf="!getDisplayValue(filter.key)">{{ filter.placeholder }}</span>
                  <svg class="multiselect-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="6 9 12 15 18 9" />
                  </svg>
                  <div class="multiselect-dropdown" *ngIf="openMultiSelect === filter.key">
                    <label class="multiselect-item" *ngFor="let opt of getFilterOptions(filter)">
                      <input type="checkbox" [checked]="isSelected(filter.key, opt.value)" (change)="toggleFilterValue(filter.key, opt.value); $event.stopPropagation()" />
                      <span>{{ opt.label }}</span>
                      <svg class="checkmark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12" /></svg>
                    </label>
                  </div>
                </div>
                <div *ngIf="filter.type === 'date'" class="filter-date-range">
                  <div class="date-range-inputs">
                    <input type="date" class="filter-date" [ngModel]="getDateRange(filter.key).start" (ngModelChange)="setDateRange(filter.key, 'start', $event)" placeholder="Desde" />
                    <span class="date-separator">-</span>
                    <input type="date" class="filter-date" [ngModel]="getDateRange(filter.key).end" (ngModelChange)="setDateRange(filter.key, 'end', $event)" placeholder="Hasta" />
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div class="filters-actions">
            <button class="filters-clear" (click)="clearFilters()">Limpiar</button>
          </div>
        </div>
      </div>
    </div>

    <!-- User actions (desktop only) -->
    <div class="user-actions desktop-only">
      <div class="notifications-container">
        <button class="btn-icon" title="Notificaciones" (click)="toggleNotifications()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
            <path d="M13.73 21a2 2 0 0 1-3.46 0" />
          </svg>
          <span class="badge-dot"></span>
        </button>

        <div class="notifications-dropdown" *ngIf="showNotifications" (clickOutside)="closeNotifications()">
          <div class="notifications-header">
            <h4>Notificaciones</h4>
            <button class="mark-read" (click)="markAllRead()">Marcar todo leído</button>
          </div>
          <div class="notifications-list" *ngIf="notifications.length > 0">
            <div class="notification-item" *ngFor="let notif of notifications" [class.unread]="!notif.read">
              <div class="notification-icon" [ngClass]="notif.type">
                <svg *ngIf="notif.type === 'alert'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z" /><line x1="12" y1="9" x2="12" y2="13" /><line x1="12" y1="17" x2="12.01" y2="17" /></svg>
                <svg *ngIf="notif.type === 'success'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" /><polyline points="22 4 12 14.01 9 11.01" /></svg>
                <svg *ngIf="notif.type === 'info'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10" /><line x1="12" y1="16" x2="12" y2="12" /><line x1="12" y1="8" x2="12.01" y2="8" /></svg>
              </div>
              <div class="notification-content">
                <div class="notification-title">{{ notif.title }}</div>
                <div class="notification-desc">{{ notif.message }}</div>
                <div class="notification-time">{{ notif.time }}</div>
              </div>
            </div>
          </div>
          <div class="notifications-empty" *ngIf="notifications.length === 0">
            No hay notificaciones
          </div>
        </div>
      </div>

      <div class="user-profile">
        <div class="avatar">AD</div>
        <div class="user-info">
          <span class="user-name">Administrador</span>
          <span class="user-role">Soporte Nivel 2</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Mobile Menu Drawer -->
  <app-topbar-mobile *ngIf="showMobileMenu" (closeMenu)="closeMobileMenu()"></app-topbar-mobile>
</header>
