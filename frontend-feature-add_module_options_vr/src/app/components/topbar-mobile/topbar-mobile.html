<div class="mobile-topbar-overlay" (click)="onClose()"></div>

<div class="mobile-topbar">
  <!-- Header -->
  <div class="mobile-header">
    <button class="close-btn" (click)="onClose()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="18" y1="6" x2="6" y2="18" />
        <line x1="6" y1="6" x2="18" y2="18" />
      </svg>
    </button>
    <span class="mobile-title">Menú</span>
  </div>

  <div class="mobile-menu-list">

    <!-- Notifications Section -->
    <div class="mobile-section">
      <button class="mobile-menu-item" (click)="toggleNotifications()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
          <path d="M13.73 21a2 2 0 0 1-3.46 0" />
        </svg>
        <span>Notificaciones</span>
        <span class="badge" *ngIf="getUnreadCount() > 0">{{ getUnreadCount() }}</span>
        <svg class="chevron" [class.open]="showNotifications" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="6 9 12 15 18 9" />
        </svg>
      </button>

      <div class="mobile-notifications-panel" *ngIf="showNotifications">
        <button class="mark-read-btn" (click)="markAllRead()">Marcar todo leído</button>

        <div class="notification-list" *ngIf="notifications.length > 0">
          <div class="notification-item" *ngFor="let notif of notifications" [class.unread]="!notif.read">
            <div class="notif-icon" [ngClass]="notif.type">
              <svg *ngIf="notif.type === 'alert'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z" />
                <line x1="12" y1="9" x2="12" y2="13" />
                <line x1="12" y1="17" x2="12.01" y2="17" />
              </svg>
              <svg *ngIf="notif.type === 'success'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
                <polyline points="22 4 12 14.01 9 11.01" />
              </svg>
              <svg *ngIf="notif.type === 'info'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10" />
                <line x1="12" y1="16" x2="12" y2="12" />
                <line x1="12" y1="8" x2="12.01" y2="8" />
              </svg>
            </div>
            <div class="notif-content">
              <div class="notif-title">{{ notif.title }}</div>
              <div class="notif-message">{{ notif.message }}</div>
              <div class="notif-time">{{ notif.time }}</div>
            </div>
          </div>
        </div>

        <div class="empty-notifications" *ngIf="notifications.length === 0">
          No hay notificaciones
        </div>
      </div>
    </div>

  </div>

  <!-- User Profile -->
  <div class="mobile-user-section">
    <div class="user-profile">
      <div class="avatar">AD</div>
      <div class="user-info">
        <span class="user-name">Administrador</span>
        <span class="user-role">Soporte Nivel 2</span>
      </div>
    </div>
  </div>
</div>
